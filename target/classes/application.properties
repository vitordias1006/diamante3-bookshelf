# ========================
# Server
# ========================
server.port=8080

# ========================
# Banco de Dados H2
# ========================
spring.datasource.url=jdbc:h2:mem:bookshelfdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ========================
# JPA / Hibernate
# ========================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ========================
# Swagger / OpenAPI
# ========================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# ========================
# Actuator
# ========================
management.endpoints.web.exposure.include=health,info,metrics,caches
management.endpoint.health.show-details=always
management.info.env.enabled=true
info.app.name=Bookshelf API
info.app.version=1.0.0
info.app.description=API REST para gerenciamento de livros, autores e resenhas

# ========================
# Cache (Caffeine)
# ========================
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=10m

# ========================
# Logging
# ========================
logging.level.com.bookshelf=DEBUG
